version: '3.8'

services:
  web:
    image: php:8.2-apache
    container_name: web_sistema_equipes
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
    depends_on:
      - db
    networks:
      - rede-sistema

  db:
    image: mysql:8.0
    container_name: db_sistema_equipes
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: sistema_equipes
      MYSQL_USER: dev_user
      MYSQL_PASSWORD: dev_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/database.sql:/docker-entrypoint-initdb.d/database.sql
    networks:
      - rede-sistema

networks:
  rede-sistema:
    driver: bridge

volumes:
  db_data: